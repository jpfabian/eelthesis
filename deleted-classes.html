<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archived Classes - EEL</title>
    <link rel="icon" href="image/eel-character.png" type="image/png">
    <script src="js/theme.js"></script>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.1/lucide.min.css" rel="stylesheet">
</head>
<body class="classes-page">
    <div class="mobile-nav-header" id="mobileNavHeader" role="banner">
        <button type="button" class="mobile-nav-btn mobile-nav-btn--menu" id="mobileNavMenuBtn" aria-label="Open menu"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 6h16M4 12h16M4 18h16"/></svg></button>
        <button type="button" id="eel-theme-header-toggle" class="theme-header-toggle" aria-label="Toggle dark/light mode"><span class="theme-icon" aria-hidden="true">☀</span><span class="theme-label">light</span></button>
    </div>

    <div id="loading-screen" class="loading-screen">
        <div class="loading-content">
            <div class="loading-spinner"></div>
            <p>Loading archived classes...</p>
        </div>
    </div>

    <div id="main-app" class="flex h-screen2 bg-background hidden">
        <div id="sidebar" class="w-64 bg-sidebar border-r border-sidebar-border h-full flex flex-col">
            <div class="p-6">
                <h1 id="sidebar-title" class="text-xl font-semibold">EEL</h1>
                <p id="sidebar-welcome" class="text-sm text-muted-foreground mt-1">Welcome</p>
            </div>
            <nav id="sidebar-nav" class="flex-1 px-4 space-y-2"></nav>
            <div class="p-4">
                <button id="logout-btn" class="w-full p-3 logout-button btn-side-bar border">
                    <i data-lucide="log-out"></i>
                    Logout
                </button>
            </div>
        </div>

        <main id="main-content" class="flex-1 overflow-auto">
            <div class="p-6 space-y-6">
                <header class="page-header">
                    <div class="page-header-icon" aria-hidden="true">
                        <i data-lucide="trash-2" class="size-8"></i>
                    </div>
                    <div>
                        <h1 class="page-header-title">Archived Classes Cache</h1>
                        <p class="page-header-subtitle">Recently archived class records saved in browser cache.</p>
                    </div>
                </header>
                <div class="card">
                    <div class="card-content p-4 flex flex-wrap items-center gap-3">
                        <input id="deleted-class-search" class="form-input" type="search" placeholder="Search class name, section, code..." style="min-width: 220px; flex: 1;">
                        <button id="deleted-class-clear" type="button" class="btn btn-outline">
                            <i data-lucide="trash" class="size-4"></i>
                            Clear Cache
                        </button>
                    </div>
                    <div class="card-content p-0">
                        <div class="scores-table-scroll table-scroll">
                            <table class="scores-table" id="deleted-classes-table">
                                <thead>
                                    <tr>
                                        <th>Archived At</th>
                                        <th>Class Name</th>
                                        <th>Section</th>
                                        <th>Subject</th>
                                        <th>Class Code</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="deleted-classes-body"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="js/auth.js"></script>
    <script src="js/navigation.js"></script>
    <script src="js-front-end/api-config.js"></script>
    <script>
        const DELETED_CLASSES_CACHE_KEY = "eel_deleted_classes_cache_v1";
        let __deletedClassRows = [];
        let __deletedClassesUser = null;

        function escapeHtml(value) {
            return String(value ?? "")
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#39;");
        }

        function formatDeletedDate(iso) {
            if (!iso) return "-";
            try {
                const d = new Date(iso);
                if (Number.isNaN(d.getTime())) return "-";
                return d.toLocaleString("en-PH", {
                    year: "numeric",
                    month: "short",
                    day: "numeric",
                    hour: "2-digit",
                    minute: "2-digit"
                });
            } catch (_) {
                return "-";
            }
        }

        function readDeletedClassCache() {
            try {
                const raw = localStorage.getItem(DELETED_CLASSES_CACHE_KEY);
                const list = JSON.parse(raw || "[]");
                return Array.isArray(list) ? list : [];
            } catch (_) {
                return [];
            }
        }

        function getDeletedClassRowKey(row) {
            const explicit = String(row?.deleted_event_id || "").trim();
            if (explicit) return explicit;
            return [
                row?.id ?? "",
                row?.name ?? "",
                row?.section ?? "",
                row?.subject ?? "",
                row?.class_code ?? "",
                row?.deleted_at ?? "",
                row?.deleted_by ?? ""
            ].join("|");
        }

        function removeDeletedClassFromCache(targetRow) {
            const list = readDeletedClassCache();
            if (!Array.isArray(list) || !list.length) return [];
            const targetKey = getDeletedClassRowKey(targetRow);
            let removed = false;
            const next = list.filter((item) => {
                if (removed) return true;
                const isMatch = getDeletedClassRowKey(item) === targetKey;
                if (isMatch) {
                    removed = true;
                    return false;
                }
                return true;
            });
            localStorage.setItem(DELETED_CLASSES_CACHE_KEY, JSON.stringify(next));
            return next;
        }

        async function restoreDeletedClass(rowKey) {
            if (!rowKey || !__deletedClassesUser) return;
            const row = __deletedClassRows.find((r) => getDeletedClassRowKey(r) === String(rowKey));
            if (!row) return;

            const classLabel = `${row.name || "Class"}${row.section ? ` (${row.section})` : ""}`;
            let confirmed = false;
            if (typeof Swal !== "undefined" && Swal && typeof Swal.fire === "function") {
                const result = await Swal.fire({
                    icon: "question",
                    title: "Restore class?",
                    text: `Restore ${classLabel} as a new class?`,
                    showCancelButton: true,
                    confirmButtonText: "Restore",
                    cancelButtonText: "Cancel",
                    confirmButtonColor: "#16a34a"
                });
                confirmed = !!result.isConfirmed;
            } else {
                confirmed = window.confirm(`Restore ${classLabel} as a new class?`);
            }
            if (!confirmed) return;

            try {
                const response = await fetch(`${window.API_BASE || ""}/api/classes`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        name: row.name || "",
                        section: row.section || "",
                        subject: row.subject || "",
                        teacher_id: __deletedClassesUser.user_id
                    })
                });
                const data = await response.json().catch(() => ({}));
                if (!response.ok || !(data.success || data.class_id || data.insertId)) {
                    showNotification(data.message || "Failed to restore class.", "error");
                    return;
                }
                const next = removeDeletedClassFromCache(row);
                __deletedClassRows = next.slice().reverse();
                const searchInput = document.getElementById("deleted-class-search");
                renderDeletedClassCache(searchInput ? searchInput.value : "");
                if (typeof showNotification === "function") {
                    const newCode = String(data.class_code || "").trim();
                    showNotification(newCode ? `Class restored. New code: ${newCode}` : "Class restored successfully.", "success");
                }
            } catch (err) {
                console.error("Restore class error:", err);
                showNotification("Server error while restoring class.", "error");
            }
        }

        function renderDeletedClassCache(filterText = "") {
            const tbody = document.getElementById("deleted-classes-body");
            if (!tbody) return;
            const q = String(filterText || "").trim().toLowerCase();
            const rows = __deletedClassRows.filter((row) => {
                if (!q) return true;
                return [
                    row.name,
                    row.section,
                    row.subject,
                    row.class_code
                ].some((v) => String(v || "").toLowerCase().includes(q));
            });

            if (!rows.length) {
                tbody.innerHTML = `<tr><td colspan="6" class="scores-section-message">No archived class records found.</td></tr>`;
                return;
            }

            tbody.innerHTML = rows.map((row) => `
                <tr>
                    <td>${escapeHtml(formatDeletedDate(row.deleted_at))}</td>
                    <td>${escapeHtml(row.name || "-")}</td>
                    <td>${escapeHtml(row.section || "-")}</td>
                    <td>${escapeHtml(row.subject || "-")}</td>
                    <td>${escapeHtml(row.class_code || "-")}</td>
                    <td>
                        <button type="button" class="btn btn-outline btn-sm deleted-class-restore-btn" data-row-key="${escapeHtml(getDeletedClassRowKey(row))}">
                            <i data-lucide="rotate-ccw" class="size-4"></i>
                            Restore
                        </button>
                    </td>
                </tr>
            `).join("");
            if (window.lucide && typeof window.lucide.createIcons === "function") {
                window.lucide.createIcons();
            }
        }

        document.addEventListener("DOMContentLoaded", async () => {
            try {
                const user = await initializePage();
                if (!user) {
                    window.location.href = "login.html";
                    return;
                }
                if (String(user.role || "").toLowerCase() !== "teacher") {
                    window.location.href = "classes.html";
                    return;
                }
                __deletedClassesUser = user;

                __deletedClassRows = readDeletedClassCache().slice().reverse();
                renderDeletedClassCache("");
                hideLoading();

                const searchInput = document.getElementById("deleted-class-search");
                if (searchInput) {
                    searchInput.addEventListener("input", () => renderDeletedClassCache(searchInput.value));
                }

                const tbody = document.getElementById("deleted-classes-body");
                if (tbody) {
                    tbody.addEventListener("click", async (e) => {
                        const btn = e.target.closest(".deleted-class-restore-btn");
                        if (!btn) return;
                        const rowKey = btn.getAttribute("data-row-key");
                        await restoreDeletedClass(rowKey);
                    });
                }

                const clearBtn = document.getElementById("deleted-class-clear");
                if (clearBtn) {
                    clearBtn.addEventListener("click", async () => {
                        const result = await Swal.fire({
                            icon: "warning",
                            title: "Clear archived class cache?",
                            text: "This will remove all cached archived class records in this browser.",
                            showCancelButton: true,
                            confirmButtonText: "Clear",
                            cancelButtonText: "Cancel",
                            confirmButtonColor: "#dc2626"
                        });
                        if (!result.isConfirmed) return;
                        localStorage.removeItem(DELETED_CLASSES_CACHE_KEY);
                        __deletedClassRows = [];
                        renderDeletedClassCache("");
                        if (typeof showNotification === "function") showNotification("Archived class cache cleared.", "success");
                    });
                }
            } catch (err) {
                console.error("Error initializing deleted classes page:", err);
                hideLoading();
            }
        });
    </script>
</body>
</html>
