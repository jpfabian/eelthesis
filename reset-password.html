<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - EEL</title>
  <link rel="icon" href="image/eel-character.png" type="image/png">
  <script src="js/theme.js"></script>
  <link rel="stylesheet" href="css/styles.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.1/lucide.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="auth-page">
  <header class="auth-header" role="banner">
    <a href="login.html" class="back-button">
      <i data-lucide="arrow-left"></i> Back
    </a>
    <button type="button" id="eel-theme-header-toggle" class="theme-header-toggle" aria-label="Toggle dark/light mode"><span class="theme-icon" aria-hidden="true">☀</span><span class="theme-label">light</span></button>
  </header>

  <div class="signup-screen">
    <div class="signup-container">
      <div class="signup-header">
        <h1 class="hero-title primary-gradient">Reset password</h1>
        <p class="hero-description" id="rp-description">Enter the code from your email to verify.</p>
      </div>

      <div class="signup-form-card">
        <div id="rp-step-verify">
          <form id="verify-code-form" class="signup-form signup-form--single-col">
            <div class="form-group rp-verify-group">
              <label class="form-label rp-verify-label">Verification code</label>
              <div id="rp-token-digits" class="rp-digit-inputs" role="group" aria-label="Enter 6-digit code">
                <input id="rp-digit-0" type="text" class="form-input rp-digit-input" maxlength="1" inputmode="numeric" pattern="[0-9]*" autocomplete="one-time-code" data-digit="0" aria-label="Digit 1">
                <input id="rp-digit-1" type="text" class="form-input rp-digit-input" maxlength="1" inputmode="numeric" pattern="[0-9]*" autocomplete="one-time-code" data-digit="1" aria-label="Digit 2">
                <input id="rp-digit-2" type="text" class="form-input rp-digit-input" maxlength="1" inputmode="numeric" pattern="[0-9]*" autocomplete="one-time-code" data-digit="2" aria-label="Digit 3">
                <input id="rp-digit-3" type="text" class="form-input rp-digit-input" maxlength="1" inputmode="numeric" pattern="[0-9]*" autocomplete="one-time-code" data-digit="3" aria-label="Digit 4">
                <input id="rp-digit-4" type="text" class="form-input rp-digit-input" maxlength="1" inputmode="numeric" pattern="[0-9]*" autocomplete="one-time-code" data-digit="4" aria-label="Digit 5">
                <input id="rp-digit-5" type="text" class="form-input rp-digit-input" maxlength="1" inputmode="numeric" pattern="[0-9]*" autocomplete="one-time-code" data-digit="5" aria-label="Digit 6">
              </div>
            </div>

            <div class="rp-verify-btn-wrap">
              <button type="submit" class="btn btn-primary rp-verify-btn">
                <i data-lucide="shield-check"></i>
                Verify code
              </button>
            </div>
          </form>
        </div>

        <div id="rp-step-password" class="hidden">
          <form id="reset-password-form" class="signup-form signup-form--single-col">
            <input type="hidden" id="rp-email-hidden" name="email">
            <input type="hidden" id="rp-token-hidden" name="token">

            <div class="form-group">
              <label class="form-label" for="rp-password">Password</label>
              <div class="password-input-container">
                <input id="rp-password" name="password" type="password" class="form-input" minlength="8" maxlength="30" placeholder="Enter new password" required>
                <button type="button" class="password-toggle" onclick="togglePassword('rp-password','rp-password-icon')">
                  <i data-lucide="eye-off" id="rp-password-icon"></i>
                </button>
              </div>
              <div class="password-strength" id="rp-password-strength"></div>
            </div>

            <div class="form-group">
              <label class="form-label" for="rp-confirm">Confirm password</label>
              <div class="password-input-container">
                <input id="rp-confirm" name="confirm" type="password" class="form-input" minlength="8" maxlength="30" required>
                <button type="button" class="password-toggle" onclick="togglePassword('rp-confirm','rp-confirm-icon')">
                  <i data-lucide="eye-off" id="rp-confirm-icon"></i>
                </button>
              </div>
            </div>

            <button type="submit" class="btn btn-primary w-full">
              <i data-lucide="key"></i>
              Update password
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <div id="loading-screen" class="loading-screen hidden">
    <div class="loading-content">
      <div class="loading-spinner"></div>
      <p id="loading-text">Verifying...</p>
    </div>
  </div>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="js-front-end/api-config.js"></script>
  <script src="js-front-end/front-reset-password.js"></script>
</body>
</html>
